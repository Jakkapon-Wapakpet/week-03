<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>รายการโปรด | GearHub</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <header>
    <div class="nav-container">
      <a href="index.html" class="logo">
        <i data-lucide="gamepad-2"></i> GearHub
      </a>
      <nav>
        <ul class="nav-links">
          <li><a href="index.html">หน้าแรก</a></li>
          <li><a href="compare.html">เปรียบเทียบสเปก <span class="badge compare-count-badge" style="display: none; position: relative; display: inline-flex; margin-left: 5px; top: auto; right: auto;">0</span></a></li>
        </ul>
      </nav>
      <div class="nav-actions">
        <div id="guest-links" style="display: flex; gap: 1rem; align-items: center;">
          <a href="login.html" class="btn-auth">เข้าสู่ระบบ</a>
        </div>
        <div id="user-links" style="display: none; gap: 1rem; align-items: center;">
          <span style="color: var(--text-muted); font-size: 0.9rem;">
            สวัสดี, <span id="user-name-display" style="color: var(--accent-secondary); font-weight: bold;">User</span>
          </span>
          <a href="my-orders.html" class="btn-icon" title="ประวัติคำสั่งซื้อ"><i data-lucide="package"></i></a>
          <a href="wishlist.html" class="btn-icon" style="border-color: var(--accent-primary);" title="รายการโปรด">
            <i data-lucide="heart" style="color: var(--accent-cta); fill: var(--accent-cta);"></i>
            <span class="badge wishlist-count-badge" style="display: none;">0</span>
          </a>
          <a href="cart.html" class="btn-icon" title="ตะกร้าสินค้า"><i data-lucide="shopping-cart"></i><span class="badge cart-count-badge" style="display: none;">0</span></a>
          <button onclick="Auth.logout()" class="btn-icon" style="border: none; background: transparent;"><i data-lucide="log-out"></i></button>
        </div>
      </div>
    </div>
  </header>

  <main class="container">
    <h2 style="margin-bottom: 2rem; font-size: 2rem;">รายการโปรดของคุณ</h2>

    <div id="empty-wishlist" style="display: none; text-align: center; padding: 4rem 1rem; background: var(--panel-bg); border: 1px solid var(--panel-border); border-radius: 16px;">
      <i data-lucide="heart" style="width: 64px; height: 64px; color: var(--text-muted); margin-bottom: 1rem; opacity: 0.5;"></i>
      <h3 style="color: var(--text-muted);">ไม่มีสินค้าในรายการโปรด</h3>
      <p style="color: var(--text-muted); margin-top: 0.5rem;">กดรูปหัวใจบนการ์ดสินค้าเพื่อบันทึกรายการโปรดของคุณ</p>
      <a href="index.html" class="btn-primary" style="display: inline-flex; margin-top: 1.5rem; width: auto;">กลับไปหน้าแรก</a>
    </div>

    <div class="products-grid" id="wishlist-container" style="display: none;">
      <!-- Wishlist items injected here -->
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/compare.js"></script>
  <script src="js/wishlist.js"></script>
  <script>
    lucide.createIcons();

    function renderWishlist() {
      const list = Wishlist.getWishlist();
      const container = document.getElementById('wishlist-container');
      const emptyMsg = document.getElementById('empty-wishlist');

      if (list.length === 0) {
        container.style.display = 'none';
        emptyMsg.style.display = 'block';
        return;
      }

      container.style.display = 'grid';
      emptyMsg.style.display = 'none';
      container.innerHTML = '';

      list.forEach(product => {
        const isOutOfStock = product.stock <= 0;
        const imageUrl = product.images && product.images.length > 0 
          ? product.images[0] 
          : 'https://via.placeholder.com/200?text=No+Image';

        const card = document.createElement('div');
        card.className = 'product-card';
        const productJson = encodeURIComponent(JSON.stringify(product));
        
        card.innerHTML = `
          <div class="product-image">
            <div class="product-tag">${product.category}</div>
            <img src="${imageUrl}" alt="${product.name}">
          </div>
          <div class="product-info">
            <h3 class="product-title">${product.name}</h3>
            <p class="product-desc">${product.description || 'ไม่มีคำอธิบาย'}</p>
            
            <div class="product-price-row">
              <span class="price">${product.price.toLocaleString()}</span>
              ${isOutOfStock 
                ? '<span style="color: var(--danger); font-size: 0.85rem; font-weight: 700;">สินค้าหมด</span>' 
                : `<span style="color: var(--success); font-size: 0.85rem; font-weight: 700;">เหลือ ${product.stock} ชิ้น</span>`
              }
            </div>
            
            <div class="actions-row">
              <button 
                class="btn-primary" 
                onclick="handleAddToCart('${productJson}')"
                ${isOutOfStock ? 'disabled' : ''}
              >
                <i data-lucide="shopping-cart" style="width: 18px; height: 18px;"></i>
                ${isOutOfStock ? 'สินค้าหมด' : 'ใส่ตะกร้า'}
              </button>
              <button 
                class="btn-secondary" 
                onclick="handleRemoveFromWishlist('${productJson}')"
                title="ลบออกจากรายการโปรด"
              >
                <i data-lucide="heart" style="width: 18px; height: 18px; color: var(--accent-cta); fill: var(--accent-cta);"></i>
              </button>
            </div>
          </div>
        `;
        container.appendChild(card);
      });

      lucide.createIcons();
    }

    window.handleAddToCart = function(encodedProduct) {
      const product = JSON.parse(decodeURIComponent(encodedProduct));
      Cart.addToCart(product, 1);
      alert(`เพิ่ม ${product.name} ลงตะกร้าสินค้าแล้ว`);
    };

    window.handleRemoveFromWishlist = function(encodedProduct) {
      const product = JSON.parse(decodeURIComponent(encodedProduct));
      Wishlist.toggleWishlist(product);
      renderWishlist();
    };

    document.addEventListener('DOMContentLoaded', () => {
      renderWishlist();
    });
  </script>
</body>
</html>
