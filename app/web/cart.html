<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ตะกร้าสินค้า - GearHub</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <!-- Navigation Bar -->
  <header>
    <div class="nav-container">
      <a href="index.html" class="logo">
        <i class="fa-solid fa-gamepad"></i> GearHub
      </a>
      <ul class="nav-links">
        <li><a href="index.html">หน้าหลัก</a></li>
        <li><a href="compare.html">เปรียบเทียบสเปก <span id="compare-nav-count" class="badge" style="display:none; position:relative; display:inline-flex; top:0; right:0; margin-left:5px;">0</span></a></li>
      </ul>
      <div class="nav-actions">
        <a href="cart.html" class="btn-icon">
          <i class="fa-solid fa-cart-shopping"></i>
          <span id="cart-count" class="badge" style="display: none;">0</span>
        </a>
        <div id="auth-container">
          <a href="login.html" class="btn-auth">เข้าสู่ระบบ</a>
        </div>
      </div>
    </div>
  </header>

  <!-- Cart Container -->
  <main class="container">
    <div class="hero" style="padding: 2rem 1rem; margin-bottom: 2rem;">
      <h1>ตะกร้า <span>สินค้าของคุณ</span></h1>
      <p>ตรวจสอบความถูกต้องของสินค้าและจำนวนก่อนเข้าสู่ขั้นตอนชำระเงิน</p>
    </div>

    <!-- Cart Layout -->
    <div class="cart-layout" id="cart-layout-container">
      <!-- Mapped dynamically via JavaScript -->
    </div>
  </main>

  <!-- Toast Notification Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Scripts -->
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/compare.js"></script>
  <script src="js/app.js"></script>
  <script>
    function renderCartPage() {
      const container = document.getElementById('cart-layout-container');
      if (!container) return;

      const items = Cart.getCart();

      if (items.length === 0) {
        container.style.display = 'block';
        container.innerHTML = `
          <div style="text-align: center; padding: 5rem; background: var(--panel-bg); border-radius: 16px; border: 1px solid var(--panel-border);">
            <i class="fa-solid fa-cart-flat-bed fa-3x" style="color: var(--text-muted); margin-bottom: 1.5rem;"></i>
            <h3>ไม่มีสินค้าในตะกร้าของคุณ</h3>
            <p style="color: var(--text-muted); margin-top: 0.5rem; margin-bottom: 1.5rem;">มาเลือกช็อปอุปกรณ์เกมมิ่งเกียร์โดนใจกันเถอะ!</p>
            <a href="index.html" class="btn-primary" style="display: inline-flex; max-width: 200px;">กลับไปเลือกซื้อสินค้า</a>
          </div>
        `;
        return;
      }

      container.style.display = 'grid';

      // 1. Items List html
      let itemsHtml = `
        <div class="cart-items-wrapper">
          <h3 style="margin-bottom:1.5rem; color:#fff; border-bottom:1px solid rgba(255,255,255,0.05); padding-bottom:0.8rem;">รายการสินค้า (${items.length})</h3>
      `;

      items.forEach(item => {
        itemsHtml += `
          <div class="cart-item">
            <img src="${item.image || 'https://placehold.co/80x80?text=No+Image'}" alt="${item.name}" onerror="this.src='https://placehold.co/80x80?text=Gaming+Gear'">
            <div class="cart-item-details">
              <h4 class="cart-item-name">${item.name}</h4>
              <span class="cart-item-price">${item.price.toLocaleString()} ฿</span>
            </div>
            
            <div class="cart-qty-ctrl">
              <button class="cart-qty-btn" onclick="updateQty('${item.productId}', ${item.quantity - 1})">-</button>
              <span class="cart-qty-val">${item.quantity}</span>
              <button class="cart-qty-btn" onclick="updateQty('${item.productId}', ${item.quantity + 1})">+</button>
            </div>
            
            <div style="font-weight:700; width:90px; text-align:right; color:#fff;">
              ${(item.price * item.quantity).toLocaleString()} ฿
            </div>

            <button class="cart-item-remove" onclick="removeCartItem('${item.productId}')" title="ลบรายการสินค้า">
              <i class="fa-solid fa-trash-can"></i>
            </button>
          </div>
        `;
      });

      itemsHtml += `</div>`;

      // 2. Summary Panel html
      const subtotal = Cart.getCartTotal();
      const shipping = subtotal >= 3000 ? 0 : 100; // Free shipping if subtotal >= 3000 Baht
      const total = subtotal + shipping;

      const summaryHtml = `
        <div class="summary-card">
          <h3>สรุปยอดสั่งซื้อ</h3>
          
          <div class="summary-row">
            <span>ยอดรวมสินค้า</span>
            <span>${subtotal.toLocaleString()} ฿</span>
          </div>
          
          <div class="summary-row">
            <span>ค่าจัดส่งพัสดุ</span>
            <span>${shipping === 0 ? '<span style="color:var(--success);">จัดส่งฟรี</span>' : `${shipping} ฿`}</span>
          </div>

          ${shipping > 0 ? `
            <div style="font-size: 0.8rem; color: var(--text-muted); margin-top: -0.5rem; margin-bottom: 1rem; text-align: right;">
              <i class="fa-solid fa-circle-info"></i> จัดส่งฟรีเมื่อซื้อสินค้าครบ 3,000 ฿ (เหลืออีก ${(3000 - subtotal).toLocaleString()} ฿)
            </div>
          ` : ''}
          
          <div class="summary-row total">
            <span>ยอดรวมสุทธิ</span>
            <span>${total.toLocaleString()} ฿</span>
          </div>
          
          <button onclick="proceedToCheckout()" class="btn-primary btn-checkout">
            ดำเนินการต่อเพื่อสั่งซื้อ <i class="fa-solid fa-chevron-right"></i>
          </button>
        </div>
      `;

      container.innerHTML = itemsHtml + summaryHtml;
    }

    function updateQty(productId, newQty) {
      Cart.updateQuantity(productId, newQty);
      renderCartPage();
    }

    function removeCartItem(productId) {
      Cart.removeFromCart(productId);
      renderCartPage();
      showToast('ลบสินค้าออกจากตะกร้าเรียบร้อยแล้ว');
    }

    function proceedToCheckout() {
      // Direct user to login if not authenticated
      if (!Auth.isLoggedIn()) {
        showToast('กรุณาเข้าสู่ระบบสมาชิกก่อนดำเนินการชำระเงิน', 'error');
        setTimeout(() => {
          window.location.href = '/login.html?redirect=checkout.html';
        }, 1200);
      } else {
        window.location.href = '/checkout.html';
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderCartPage();
    });

    window.updateQty = updateQty;
    window.removeCartItem = removeCartItem;
    window.proceedToCheckout = proceedToCheckout;
  </script>
</body>
</html>
