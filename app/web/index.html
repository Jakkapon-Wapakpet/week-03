<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GearHub - Smart Gaming Gear Store</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <!-- Navigation Bar -->
  <header>
    <div class="nav-container">
      <a href="index.html" class="logo">
        <i class="fa-solid fa-gamepad"></i> GearHub
      </a>
      
      <ul class="nav-links">
        <li><a href="index.html" class="active">หน้าหลัก</a></li>
        <li><a href="compare.html">เปรียบเทียบสเปก <span id="compare-nav-count" class="badge" style="display:none; position:relative; display:inline-flex; top:0; right:0; margin-left:5px;">0</span></a></li>
      </ul>

      <div class="nav-actions">
        <!-- Shopping Cart Button -->
        <a href="cart.html" class="btn-icon">
          <i class="fa-solid fa-cart-shopping"></i>
          <span id="cart-count" class="badge" style="display: none;">0</span>
        </a>

        <!-- Admin Control Link (hidden by default) -->
        <a href="admin.html" id="admin-link" class="btn-icon" style="display: none;" title="แผงควบคุมแอดมิน">
          <i class="fa-solid fa-user-shield"></i>
        </a>

        <!-- Auth Status Container -->
        <div id="auth-container">
          <a href="login.html" class="btn-auth">เข้าสู่ระบบ</a>
        </div>
      </div>
    </div>
  </header>

  <!-- Hero Section -->
  <section class="hero">
    <h1>ค้นหาอุปกรณ์เกมมิ่งเกียร์ที่ <span>ใช่สำหรับคุณ</span></h1>
    <p>เปรียบเทียบสเปก เช็คน้ำหนัก ขนาด และเลือกอุปกรณ์ที่ดีที่สุดสำหรับชัยชนะของคุณในคลิกเดียว</p>
  </section>

  <!-- Main Store Container -->
  <main class="container">
    
    <!-- Controls (Search and Filters) -->
    <div class="controls-panel">
      <!-- Search Input -->
      <div class="search-bar">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="search-input" placeholder="ค้นหาอุปกรณ์เกียร์, ยี่ห้อ, หรือคีย์เวิร์ด...">
      </div>

      <!-- Category Filter Buttons -->
      <div class="filters" id="category-filters">
        <button class="filter-btn active" data-category="">ทั้งหมด</button>
        <button class="filter-btn" data-category="Mouse">เมาส์ (Mice)</button>
        <button class="filter-btn" data-category="Keyboard">คีย์บอร์ด (Keyboards)</button>
        <button class="filter-btn" data-category="Headset">หูฟัง (Headsets)</button>
      </div>
    </div>

    <!-- Products Grid -->
    <section class="products-grid" id="products-container">
      <!-- Mapped dynamically via JavaScript -->
      <div style="grid-column: 1/-1; text-align: center; padding: 3rem;">
        <i class="fa-solid fa-spinner fa-spin fa-2xl" style="color: var(--accent-secondary);"></i>
        <p style="margin-top: 1rem; color: var(--text-muted);">กำลังโหลดรายการสินค้า...</p>
      </div>
    </section>

  </main>

  <!-- Toast Notifications Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Scripts -->
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/compare.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
