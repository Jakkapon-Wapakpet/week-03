<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ชำระเงิน | GearHub</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <header>
    <div class="nav-container">
      <a href="index.html" class="logo">
        <i data-lucide="gamepad-2"></i> GearHub
      </a>
      <nav>
        <ul class="nav-links">
          <li><a href="index.html">หน้าแรก</a></li>
        </ul>
      </nav>
      <div class="nav-actions">
        <div id="guest-links" style="display: flex; gap: 1rem; align-items: center;">
          <a href="login.html" class="btn-auth">เข้าสู่ระบบ</a>
        </div>
        <div id="user-links" style="display: none; gap: 1rem; align-items: center;">
          <a href="my-orders.html" class="btn-icon"><i data-lucide="package"></i></a>
          <a href="cart.html" class="btn-icon"><i data-lucide="shopping-cart"></i><span class="badge cart-count-badge" style="display: none;">0</span></a>
          <button onclick="Auth.logout()" class="btn-icon" style="border: none; background: transparent;"><i data-lucide="log-out"></i></button>
        </div>
      </div>
    </div>
  </header>

  <main class="container">
    <h2 style="margin-bottom: 2rem; font-size: 2rem;">ข้อมูลการจัดส่งและชำระเงิน</h2>
    
    <div id="checkout-error" style="display: none; color: var(--danger); margin-bottom: 1rem; padding: 1rem; background: rgba(239,68,68,0.1); border-radius: 8px;"></div>
    <div id="checkout-success" style="display: none; color: var(--success); margin-bottom: 1rem; padding: 1rem; background: rgba(16,185,129,0.1); border-radius: 8px;">สั่งซื้อสำเร็จ! กำลังพากลับไปหน้าประวัติคำสั่งซื้อ...</div>

    <div class="cart-layout">
      <!-- Shipping Form -->
      <form id="checkout-form" class="cart-items-wrapper">
        <h3 style="margin-bottom: 1.5rem; font-size: 1.25rem;">ที่อยู่จัดส่ง</h3>
        
        <div class="form-row">
          <div class="form-group">
            <label for="receiverName">ชื่อผู้รับ</label>
            <input type="text" id="receiverName" required>
          </div>
          <div class="form-group">
            <label for="phone">เบอร์โทรศัพท์</label>
            <input type="tel" id="phone" required>
          </div>
        </div>
        
        <div class="form-group">
          <label for="addressLine">ที่อยู่ (บ้านเลขที่, หมู่บ้าน, ถนน)</label>
          <input type="text" id="addressLine" required>
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label for="subDistrict">แขวง/ตำบล</label>
            <input type="text" id="subDistrict" required>
          </div>
          <div class="form-group">
            <label for="district">เขต/อำเภอ</label>
            <input type="text" id="district" required>
          </div>
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label for="province">จังหวัด</label>
            <input type="text" id="province" required>
          </div>
          <div class="form-group">
            <label for="postalCode">รหัสไปรษณีย์</label>
            <input type="text" id="postalCode" required>
          </div>
        </div>
        
        <h3 style="margin-top: 2rem; margin-bottom: 1.5rem; font-size: 1.25rem;">วิธีชำระเงิน</h3>
        <div class="form-group">
          <select id="paymentMethod" required>
            <option value="PromptPay">พร้อมเพย์ (PromptPay) - แนะนำ</option>
            <option value="CreditCard">บัตรเครดิต</option>
            <option value="DebitCard">บัตรเดบิต</option>
          </select>
        </div>
      </form>

      <!-- Order Summary -->
      <div class="summary-card">
        <h3>สรุปคำสั่งซื้อ</h3>
        <div id="checkout-items"></div>
        
        <div class="summary-row total">
          <span>ยอดรวมทั้งสิ้น:</span>
          <span id="summary-total">0 ฿</span>
        </div>
        
        <button type="submit" form="checkout-form" id="btn-submit" class="btn-primary" style="margin-top: 2rem;">
          ยืนยันการสั่งซื้อ <i data-lucide="check-circle" style="width: 18px; height: 18px;"></i>
        </button>
      </div>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script>
    lucide.createIcons();

    if (!Auth.isLoggedIn()) {
      alert('กรุณาเข้าสู่ระบบก่อนทำการสั่งซื้อ');
      window.location.href = 'login.html?redirect=checkout.html';
    }

    const cart = Cart.getCart();
    if (cart.length === 0) {
      alert('ตะกร้าสินค้าว่างเปล่า');
      window.location.href = 'index.html';
    }

    // Pre-fill user data
    const user = Auth.getUser();
    if (user && user.profile) {
      document.getElementById('receiverName').value = `${user.profile.firstName} ${user.profile.lastName}`;
      document.getElementById('phone').value = user.profile.phoneNumber;
    }

    // Render summary
    const checkoutItemsEl = document.getElementById('checkout-items');
    cart.forEach(item => {
      const row = document.createElement('div');
      row.className = 'summary-row';
      row.innerHTML = `<span>${item.quantity}x ${item.name}</span><span>${(item.price * item.quantity).toLocaleString()} ฿</span>`;
      checkoutItemsEl.appendChild(row);
    });
    document.getElementById('summary-total').textContent = `${Cart.getCartTotal().toLocaleString()} ฿`;

    // Handle form submit
    document.getElementById('checkout-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const btn = document.getElementById('btn-submit');
      const errEl = document.getElementById('checkout-error');
      const succEl = document.getElementById('checkout-success');

      errEl.style.display = 'none';
      btn.disabled = true;
      btn.innerHTML = 'กำลังดำเนินการ... <i data-lucide="loader-2" class="lucide-spin"></i>';
      lucide.createIcons();

      const shippingAddress = {
        receiverName: document.getElementById('receiverName').value,
        phone: document.getElementById('phone').value,
        addressLine: document.getElementById('addressLine').value,
        subDistrict: document.getElementById('subDistrict').value,
        district: document.getElementById('district').value,
        province: document.getElementById('province').value,
        postalCode: document.getElementById('postalCode').value
      };

      const paymentMethod = document.getElementById('paymentMethod').value;
      
      try {
        // Create order
        const orderRes = await apiCall('/orders', {
          method: 'POST',
          body: JSON.stringify({
            items: cart,
            shippingAddress,
            paymentMethod
          })
        });

        if (orderRes.success) {
          // If PromptPay, automatically set to paid for this simplified version
          // (In real life, this would redirect to a payment gateway)
          if (paymentMethod === 'PromptPay') {
             await apiCall(`/orders/${orderRes.order._id}/pay`, { method: 'PUT' });
          }

          Cart.clearCart();
          succEl.style.display = 'block';
          
          setTimeout(() => {
            window.location.href = 'my-orders.html';
          }, 1500);
        } else {
          errEl.textContent = orderRes.message || 'เกิดข้อผิดพลาดในการสร้างคำสั่งซื้อ';
          errEl.style.display = 'block';
          btn.disabled = false;
          btn.innerHTML = 'ยืนยันการสั่งซื้อ <i data-lucide="check-circle"></i>';
          lucide.createIcons();
        }
      } catch (error) {
        errEl.textContent = 'Network Error';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = 'ยืนยันการสั่งซื้อ <i data-lucide="check-circle"></i>';
        lucide.createIcons();
      }
    });
  </script>
</body>
</html>
