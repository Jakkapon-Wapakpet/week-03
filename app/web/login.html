<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เข้าสู่ระบบ - GearHub</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <!-- Navigation Bar -->
  <header>
    <div class="nav-container">
      <a href="index.html" class="logo">
        <i class="fa-solid fa-gamepad"></i> GearHub
      </a>
      <ul class="nav-links">
        <li><a href="index.html">หน้าหลัก</a></li>
        <li><a href="compare.html">เปรียบเทียบสเปก</a></li>
      </ul>
      <div class="nav-actions">
        <a href="cart.html" class="btn-icon">
          <i class="fa-solid fa-cart-shopping"></i>
          <span id="cart-count" class="badge" style="display: none;">0</span>
        </a>
      </div>
    </div>
  </header>

  <!-- Auth Card Section -->
  <main class="container auth-wrapper">
    <div class="auth-card">
      <h2>เข้าสู่ระบบ</h2>
      <p>ยินดีต้อนรับกลับมา! กรุณาเข้าสู่ระบบเพื่อดำเนินการต่อ</p>
      
      <form id="login-form">
        <div class="form-group">
          <label for="email">อีเมล</label>
          <input type="email" id="email" required placeholder="example@email.com">
        </div>
        
        <div class="form-group">
          <label for="password">รหัสผ่าน</label>
          <input type="password" id="password" required placeholder="ป้อนรหัสผ่านของคุณ">
        </div>

        <button type="submit" class="btn-primary">เข้าสู่ระบบ <i class="fa-solid fa-arrow-right-to-bracket"></i></button>
      </form>

      <div class="auth-footer">
        ยังไม่มีบัญชีสมาชิก? <a href="register.html">สมัครสมาชิกที่นี่</a>
      </div>
    </div>
  </main>

  <!-- Toast Notification Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Scripts -->
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/compare.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const res = await Auth.login(email, password);
        showToast('เข้าสู่ระบบสำเร็จแล้ว!', 'success');
        
        // Redirect to admin dashboard if user is admin, else go to home
        setTimeout(() => {
          if (res.user && res.user.role === 'admin') {
            window.location.href = '/admin.html';
          } else {
            window.location.href = '/index.html';
          }
        }, 1000);
      } catch (error) {
        showToast(error.message || 'อีเมลหรือรหัสผ่านไม่ถูกต้อง', 'error');
      }
    });

    // If already logged in, redirect to index
    if (Auth.isLoggedIn()) {
      window.location.href = '/index.html';
    }
  </script>
</body>
</html>
