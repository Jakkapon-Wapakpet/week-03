<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เปรียบเทียบสเปกสินค้า - GearHub</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <!-- Navigation Bar -->
  <header>
    <div class="nav-container">
      <a href="index.html" class="logo">
        <i class="fa-solid fa-gamepad"></i> GearHub
      </a>
      <ul class="nav-links">
        <li><a href="index.html">หน้าหลัก</a></li>
        <li><a href="compare.html" class="active">เปรียบเทียบสเปก <span id="compare-nav-count" class="badge" style="display:none; position:relative; display:inline-flex; top:0; right:0; margin-left:5px;">0</span></a></li>
      </ul>
      <div class="nav-actions">
        <a href="cart.html" class="btn-icon">
          <i class="fa-solid fa-cart-shopping"></i>
          <span id="cart-count" class="badge" style="display: none;">0</span>
        </a>
        <div id="auth-container">
          <a href="login.html" class="btn-auth">เข้าสู่ระบบ</a>
        </div>
      </div>
    </div>
  </header>

  <!-- Comparison Section -->
  <main class="container">
    <div class="hero" style="padding: 2rem 1rem; margin-bottom: 2rem;">
      <h1>ตาราง <span>เปรียบเทียบคุณสมบัติ</span></h1>
      <p>วิเคราะห์เปรียบเทียบข้อมูลจำเพาะเชิงเทคนิค ขนาด น้ำหนัก และความคุ้มค่าแบบเคียงข้างกัน</p>
    </div>

    <!-- Comparison Table Output -->
    <div class="comparison-container" id="comparison-view">
      <!-- Mapped dynamically via JavaScript -->
    </div>
  </main>

  <!-- Toast Notification Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Scripts -->
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/compare.js"></script>
  <script src="js/app.js"></script>
  <script>
    // Build the dynamic comparison table
    function renderCompareTable() {
      const view = document.getElementById('comparison-view');
      if (!view) return;

      const list = Compare.getCompareList();

      if (list.length === 0) {
        view.innerHTML = `
          <div style="text-align: center; padding: 5rem; background: var(--panel-bg); border-radius: 16px; border: 1px solid var(--panel-border);">
            <i class="fa-solid fa-sliders fa-3x" style="color: var(--text-muted); margin-bottom: 1.5rem;"></i>
            <h3>ไม่มีอุปกรณ์เกียร์ในตารางเปรียบเทียบ</h3>
            <p style="color: var(--text-muted); margin-top: 0.5rem; margin-bottom: 1.5rem;">คุณสามารถกดไอคอนปุ่มปรับแต่งสเปกเพื่อเพิ่มสินค้ามาเทียบกันได้สูงสุด 3 ชิ้น</p>
            <a href="index.html" class="btn-primary" style="display: inline-flex; max-width: 200px;">กลับไปเลือกสินค้า</a>
          </div>
        `;
        return;
      }

      // Check if products have matching categories to highlight best specs
      const minPrice = Math.min(...list.map(p => p.price));
      
      // Weight parser helper to find lightest
      const getWeightNumber = (wStr) => {
        if (!wStr) return Infinity;
        const matched = wStr.match(/(\d+(?:\.\d+)?)/);
        return matched ? parseFloat(matched[1]) : Infinity;
      };
      const weights = list.map(p => getWeightNumber(p.specifications.weight));
      const minWeight = Math.min(...weights);

      // Render table
      let tableHtml = `
        <table class="comparison-table">
          <thead>
            <tr>
              <th>คุณสมบัติ (Specifications)</th>
      `;

      // Product Headers Row
      list.forEach(p => {
        tableHtml += `
          <td class="compare-header-cell">
            <img src="${p.images && p.images[0] ? p.images[0] : 'https://placehold.co/120x120?text=No+Image'}" alt="${p.name}" onerror="this.src='https://placehold.co/120x120?text=Gaming+Gear'">
            <h3>${p.name}</h3>
            <button class="compare-remove-btn" onclick="removeFromComparePage('${p._id}')">
              <i class="fa-solid fa-trash-can"></i> เอาออก
            </button>
          </td>
        `;
      });
      tableHtml += `
            </tr>
          </thead>
          <tbody>
      `;

      // Category Row
      tableHtml += `<tr><th>หมวดหมู่</th>`;
      list.forEach(p => {
        tableHtml += `<td>${p.category}</td>`;
      });
      tableHtml += `</tr>`;

      // Price Row (highlight cheapest)
      tableHtml += `<tr><th>ราคา</th>`;
      list.forEach(p => {
        const isCheapest = p.price === minPrice && list.length > 1;
        const highlightStyle = isCheapest ? 'class="spec-highlight" style="color: var(--accent-secondary); font-weight: bold;"' : '';
        tableHtml += `<td ${highlightStyle}>${p.price.toLocaleString()} ฿ ${isCheapest ? ' <i class="fa-solid fa-tags" title="ราคาประหยัดที่สุด"></i> คุ้มสุด!' : ''}</td>`;
      });
      tableHtml += `</tr>`;

      // Weight Row (highlight lightest)
      tableHtml += `<tr><th>น้ำหนัก (Weight)</th>`;
      list.forEach((p, idx) => {
        const isLightest = weights[idx] === minWeight && weights[idx] !== Infinity && list.length > 1;
        const highlightStyle = isLightest ? 'class="spec-highlight" style="color: var(--success); font-weight: bold;"' : '';
        tableHtml += `<td ${highlightStyle}>${p.specifications.weight || 'N/A'} ${isLightest ? ' <i class="fa-solid fa-feather-pointed" title="น้ำหนักเบาที่สุด"></i> เบาสุด!' : ''}</td>`;
      });
      tableHtml += `</tr>`;

      // Color Row
      tableHtml += `<tr><th>สี (Color)</th>`;
      list.forEach(p => {
        tableHtml += `<td>${p.specifications.color || 'N/A'}</td>`;
      });
      tableHtml += `</tr>`;

      // Connection Row
      tableHtml += `<tr><th>การเชื่อมต่อ (Connection)</th>`;
      list.forEach(p => {
        tableHtml += `<td>${p.specifications.connection || 'N/A'}</td>`;
      });
      tableHtml += `</tr>`;

      // Sensor Row
      tableHtml += `<tr><th>เซนเซอร์ (Mice Sensor)</th>`;
      list.forEach(p => {
        tableHtml += `<td>${p.specifications.sensor || '-'}</td>`;
      });
      tableHtml += `</tr>`;

      // Polling Rate Row
      tableHtml += `<tr><th>Polling Rate</th>`;
      list.forEach(p => {
        tableHtml += `<td>${p.specifications.pollingRate || '-'}</td>`;
      });
      tableHtml += `</tr>`;

      // Switch Type Row
      tableHtml += `<tr><th>สวิตช์ (Switch Type)</th>`;
      list.forEach(p => {
        tableHtml += `<td>${p.specifications.switchType || '-'}</td>`;
      });
      tableHtml += `</tr>`;

      // Hot Swappable Row
      tableHtml += `<tr><th>Hot-Swappable</th>`;
      list.forEach(p => {
        const val = p.specifications.hotSwappable;
        const label = val === true ? '<span style="color: var(--success);"><i class="fa-solid fa-circle-check"></i> รองรับ</span>' : (val === false ? '<span style="color: var(--danger);"><i class="fa-solid fa-circle-xmark"></i> ไม่รองรับ</span>' : '-');
        tableHtml += `<td>${label}</td>`;
      });
      tableHtml += `</tr>`;

      // Battery Life Row
      tableHtml += `<tr><th>ชั่วโมงแบตเตอรี่ (Battery)</th>`;
      list.forEach(p => {
        tableHtml += `<td>${p.specifications.batteryLife || 'N/A'}</td>`;
      });
      tableHtml += `</tr>`;

      // Actions Row
      tableHtml += `<tr><th>การดำเนินการ</th>`;
      list.forEach(p => {
        tableHtml += `
          <td>
            <button class="btn-primary" onclick="addFromCompareToCart('${p._id}')" ${p.stock === 0 ? 'disabled' : ''} style="width:100%;">
              <i class="fa-solid fa-cart-plus"></i> ซื้อเลย
            </button>
          </td>
        `;
      });
      tableHtml += `</tr>`;

      tableHtml += `
          </tbody>
        </table>
      `;

      view.innerHTML = tableHtml;
    }

    // Handler to remove item and reload table
    function removeFromComparePage(id) {
      Compare.removeFromCompare(id);
      renderCompareTable();
      showToast('นำอุปกรณ์เกียร์ออกจากการเปรียบเทียบเรียบร้อย');
    }

    // Add to cart from compare view
    async function addFromCompareToCart(id) {
      const list = Compare.getCompareList();
      const product = list.find(p => p._id === id);
      if (product) {
        Cart.addToCart(product, 1);
        showToast(`หยิบ "${product.name}" ใส่ตะกร้าแล้ว!`, 'success');
      }
    }

    // Initialize Page
    document.addEventListener('DOMContentLoaded', () => {
      renderCompareTable();
    });

    window.removeFromComparePage = removeFromComparePage;
    window.addFromCompareToCart = addFromCompareToCart;
  </script>
</body>
</html>
