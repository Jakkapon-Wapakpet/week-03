<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>สมัครสมาชิก - GearHub</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <!-- Navigation Bar -->
  <header>
    <div class="nav-container">
      <a href="index.html" class="logo">
        <i class="fa-solid fa-gamepad"></i> GearHub
      </a>
      <ul class="nav-links">
        <li><a href="index.html">หน้าหลัก</a></li>
        <li><a href="compare.html">เปรียบเทียบสเปก</a></li>
      </ul>
      <div class="nav-actions">
        <a href="cart.html" class="btn-icon">
          <i class="fa-solid fa-cart-shopping"></i>
          <span id="cart-count" class="badge" style="display: none;">0</span>
        </a>
      </div>
    </div>
  </header>

  <!-- Auth Card Section -->
  <main class="container auth-wrapper">
    <div class="auth-card" style="max-width: 500px; margin: 3rem 0;">
      <h2>สมัครสมาชิก</h2>
      <p>ร่วมเป็นส่วนหนึ่งของระบบช็อปปิ้งอัจฉริยะกับเรา!</p>
      
      <form id="register-form">
        <!-- Username & Email -->
        <div class="form-row">
          <div class="form-group">
            <label for="username">ชื่อผู้ใช้งาน</label>
            <input type="text" id="username" required placeholder="เช่น gamer_pro">
          </div>
          <div class="form-group">
            <label for="email">อีเมล</label>
            <input type="email" id="email" required placeholder="gamer@example.com">
          </div>
        </div>
        
        <!-- Password & Role selection -->
        <div class="form-row">
          <div class="form-group">
            <label for="password">รหัสผ่าน</label>
            <input type="password" id="password" required placeholder="อย่างน้อย 6 ตัวอักษร">
          </div>
          <div class="form-group">
            <label for="role">ประเภทผู้ใช้ (เพื่อการทดสอบ)</label>
            <select id="role">
              <option value="customer">ลูกค้าทั่วไป (Customer)</option>
              <option value="admin">ผู้ดูแลระบบ (Admin)</option>
            </select>
          </div>
        </div>

        <!-- Personal Info -->
        <div class="form-row">
          <div class="form-group">
            <label for="firstName">ชื่อจริง</label>
            <input type="text" id="firstName" required placeholder="เช่น สมเกียรติ">
          </div>
          <div class="form-group">
            <label for="lastName">นามสกุล</label>
            <input type="text" id="lastName" required placeholder="เช่น รักดี">
          </div>
        </div>

        <!-- Phone Number -->
        <div class="form-group">
          <label for="phoneNumber">เบอร์โทรศัพท์</label>
          <input type="tel" id="phoneNumber" required placeholder="เช่น 0812345678">
        </div>

        <button type="submit" class="btn-primary">ลงทะเบียนสมาชิก <i class="fa-solid fa-user-plus"></i></button>
      </form>

      <div class="auth-footer">
        มีบัญชีสมาชิกอยู่แล้ว? <a href="login.html">เข้าสู่ระบบที่นี่</a>
      </div>
    </div>
  </main>

  <!-- Toast Notification Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Scripts -->
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/compare.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const firstName = document.getElementById('firstName').value;
      const lastName = document.getElementById('lastName').value;
      const phoneNumber = document.getElementById('phoneNumber').value;
      const role = document.getElementById('role').value;

      try {
        await Auth.register(username, email, password, firstName, lastName, phoneNumber, role);
        showToast('สมัครสมาชิกสำเร็จแล้ว และกำลังล็อกอินเข้าสู่ระบบ...', 'success');
        
        setTimeout(() => {
          if (role === 'admin') {
            window.location.href = '/admin.html';
          } else {
            window.location.href = '/index.html';
          }
        }, 1200);
      } catch (error) {
        showToast(error.message || 'เกิดข้อผิดพลาดในการสมัครสมาชิก', 'error');
      }
    });

    // If already logged in, redirect to index
    if (Auth.isLoggedIn()) {
      window.location.href = '/index.html';
    }
  </script>
</body>
</html>
