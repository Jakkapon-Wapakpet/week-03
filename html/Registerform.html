<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Form</title>
    <!-- Google Fonts: Outfit & Prompt -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --card-bg: #ffffff;
            --text-primary: #2d3748; /* Dark Charcoal */
            --text-secondary: #718096; /* Slate Gray */
            --accent-gradient: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
            --accent-color: #a6c1ee;
            --font-sans: 'Outfit', 'Prompt', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-primary);
            font-family: var(--font-sans);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2.5rem 1rem;
        }

        /* Claymorphic 3D Card */
        .register-card {
            background: var(--card-bg);
            border-radius: 36px;
            padding: 3.5rem 3rem;
            width: 100%;
            max-width: 480px;
            box-shadow: 
                16px 16px 32px rgba(166, 180, 200, 0.45), 
                -16px -16px 32px rgba(255, 255, 255, 0.9), 
                inset 3px 3px 6px rgba(255, 255, 255, 0.8), 
                inset -3px -3px 6px rgba(166, 180, 200, 0.15);
            animation: cardEntrance 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Header Style */
        .card-header {
            display: flex;
            align-items: center;
            gap: 1.25rem;
            margin-bottom: 2.5rem;
        }

        .icon-circle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--accent-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            box-shadow: 
                4px 4px 10px rgba(166, 180, 200, 0.35), 
                -4px -4px 10px rgba(255, 255, 255, 0.8), 
                inset 2px 2px 4px rgba(255, 255, 255, 0.4);
            animation: floatIcon 3.5s ease-in-out infinite;
        }

        @keyframes floatIcon {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-6px) rotate(3deg); }
        }

        .header-title {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--text-primary);
        }

        /* Form Controls */
        .form-group {
            margin-bottom: 1.75rem;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .form-label {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* Inset Clay Input */
        .form-input {
            background: #f0f4f8;
            border: 2px solid transparent;
            border-radius: 18px;
            padding: 14px 18px;
            font-family: var(--font-sans);
            font-size: 0.95rem;
            color: var(--text-primary);
            box-shadow: 
                inset 4px 4px 8px rgba(166, 180, 200, 0.3), 
                inset -4px -4px 8px rgba(255, 255, 255, 0.9);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            outline: none;
        }

        .form-input::placeholder {
            color: #a0aec0;
        }

        .form-input:focus {
            border-color: var(--accent-color);
            background: #ffffff;
            box-shadow: 
                0 8px 16px rgba(166, 180, 200, 0.25), 
                inset 1px 1px 2px rgba(255, 255, 255, 0.8);
            transform: translateY(-1px);
        }

        /* Options layout */
        .options-group {
            margin-bottom: 2rem;
        }

        .options-title {
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 0.9rem;
            color: var(--text-primary);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .options-list {
            display: flex;
            gap: 0.75rem;
            width: 100%;
        }

        /* Hidden inputs */
        .option-input {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        /* Soft 3D pill badges */
        .option-label {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 16px;
            border-radius: 18px;
            background: #f0f4f8;
            border: 2px solid transparent;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            user-select: none;
            font-size: 0.92rem;
            flex: 1;
            text-align: center;
            font-weight: 600;
            box-shadow: 
                4px 4px 8px rgba(166, 180, 200, 0.25), 
                -4px -4px 8px rgba(255, 255, 255, 0.9), 
                inset 2px 2px 4px rgba(255, 255, 255, 0.5);
        }

        .option-label:hover {
            color: var(--text-primary);
            transform: translateY(-2px);
            box-shadow: 
                6px 6px 12px rgba(166, 180, 200, 0.3), 
                -6px -6px 12px rgba(255, 255, 255, 0.95);
        }

        /* Checked Popping Chip State using :has */
        .option-label:has(.option-input:checked) {
            background: var(--accent-gradient);
            color: #ffffff;
            font-weight: 700;
            transform: scale(1.02) translateY(-2px);
            box-shadow: 
                6px 10px 20px rgba(166, 180, 200, 0.4), 
                inset 2px 2px 4px rgba(255, 255, 255, 0.4);
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        }

        /* Popping 3D Submit Button */
        .submit-btn {
            position: relative;
            background: var(--accent-gradient);
            color: #ffffff;
            border: none;
            border-radius: 18px;
            padding: 16px 20px;
            font-family: var(--font-sans);
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 
                0 10px 20px rgba(166, 180, 200, 0.4), 
                inset 2px 2px 4px rgba(255, 255, 255, 0.4);
            outline: none;
            margin-top: 1.25rem;
            letter-spacing: 0.5px;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.15);
        }

        .submit-btn:hover {
            transform: scale(1.02) translateY(-3px);
            box-shadow: 
                0 14px 28px rgba(166, 180, 200, 0.5), 
                inset 2px 2px 4px rgba(255, 255, 255, 0.4);
        }

        .submit-btn:active {
            transform: scale(0.98) translateY(1px);
            box-shadow: 
                inset 3px 3px 6px rgba(0, 0, 0, 0.15);
        }
    </style>
</head>
<body>

    <div class="register-card">
        
        <!-- Header -->
        <div class="card-header">
            <div class="icon-circle">📦</div>
            <h1 class="header-title">Register form</h1>
        </div>

        <form action="" method="POST">
            
            <!-- Username Field -->
            <div class="form-group">
                <label class="form-label" for="username">ชื่อผู้ใช้ (Username)</label>
                <input class="form-input" id="username" type="text" name="username" placeholder="กรอกชื่อผู้ใช้ของคุณ..." required>
            </div>

            <!-- Password Field -->
            <div class="form-group">
                <label class="form-label" for="password">รหัสผ่าน (Password)</label>
                <input class="form-input" id="password" type="password" name="password" placeholder="••••••••" required>
            </div>

            <!-- Email Field -->
            <div class="form-group">
                <label class="form-label" for="email">อีเมล (Email)</label>
                <input class="form-input" id="email" type="email" name="email" placeholder="example@email.com" required>
            </div>

            <!-- Package Selection (Radio Buttons as Chips) -->
            <div class="options-group">
                <p class="options-title">เลือกแพ็กเกจ (Package)</p>
                <div class="options-list">
                    <label class="option-label">
                        <input class="option-input" type="radio" name="package" value="free" required>
                        <span>ฟรี (Free)</span>
                    </label>
                    <label class="option-label">
                        <input class="option-input" type="radio" name="package" value="premium">
                        <span>พรีเมียม (Premium)</span>
                    </label>
                </div>
            </div>

            <!-- Interests (Checkboxes as Chips) -->
            <div class="options-group">
                <p class="options-title">ความสนใจ (Interests)</p>
                <div class="options-list">
                    <label class="option-label">
                        <input class="option-input" type="checkbox" name="interests" value="movies">
                        <span>ดูหนัง</span>
                    </label>
                    <label class="option-label">
                        <input class="option-input" type="checkbox" name="interests" value="music">
                        <span>ฟังเพลง</span>
                    </label>
                    <label class="option-label">
                        <input class="option-input" type="checkbox" name="interests" value="games">
                        <span>เล่นเกม</span>
                    </label>
                </div>
            </div>

            <!-- Submit Button -->
            <button class="submit-btn" type="submit">ยืนยันการสมัคร</button>

        </form>

    </div>

</body>
</html>
