<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Form</title>
    <!-- Google Fonts: Outfit & Prompt -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            --card-bg: rgba(255, 255, 255, 0.06);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-primary: #ffffff;
            --text-secondary: #b0bec5;
            --accent-color: #00f5d4;
            --accent-glow: rgba(0, 245, 212, 0.4);
            --font-sans: 'Outfit', 'Prompt', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-primary);
            font-family: var(--font-sans);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1rem;
        }

        .register-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 480px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Header Style */
        .card-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2.5rem;
        }

        .header-icon {
            font-size: 2.5rem;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .header-title {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(to right, #ffffff, #00f5d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Form Controls */
        .form-group {
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-label {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-primary);
        }

        .form-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px 16px;
            font-family: var(--font-sans);
            font-size: 0.95rem;
            color: var(--text-primary);
            transition: all 0.3s ease;
            outline: none;
        }

        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .form-input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 12px var(--accent-glow);
            background: rgba(255, 255, 255, 0.08);
        }

        /* Option Layouts (Radio & Checkbox) */
        .options-group {
            margin-bottom: 1.75rem;
        }

        .options-title {
            font-size: 0.95rem;
            font-weight: 500;
            margin-bottom: 0.75rem;
            color: var(--text-primary);
        }

        .options-list {
            display: flex;
            gap: 1.25rem;
            flex-wrap: wrap;
        }

        .option-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.92rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: color 0.2s ease;
        }

        .option-label:hover {
            color: var(--text-primary);
        }

        /* Custom styling for standard radio/checkbox */
        .option-input {
            appearance: none;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 18px;
            height: 18px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-grid;
            place-content: center;
            outline: none;
        }

        /* Radio Specific */
        .option-input[type="radio"] {
            border-radius: 50%;
        }

        .option-input[type="radio"]::before {
            content: "";
            width: 8px;
            height: 8px;
            border-radius: 50%;
            transform: scale(0);
            transition: transform 0.2s ease;
            background-color: var(--accent-color);
            box-shadow: 0 0 8px var(--accent-glow);
        }

        .option-input[type="radio"]:checked::before {
            transform: scale(1);
        }

        /* Checkbox Specific */
        .option-input[type="checkbox"] {
            border-radius: 4px;
        }

        .option-input[type="checkbox"]::before {
            content: "";
            width: 10px;
            height: 10px;
            transform: scale(0);
            transition: transform 0.2s ease;
            background-color: var(--accent-color);
            clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
        }

        .option-input[type="checkbox"]:checked::before {
            transform: scale(1);
        }

        /* Checked labels */
        .option-input:checked {
            border-color: var(--accent-color);
            box-shadow: 0 0 8px var(--accent-glow);
        }

        .option-input:checked + span {
            color: var(--accent-color);
            font-weight: 500;
        }

        /* Submit Button */
        .submit-btn {
            background: linear-gradient(135deg, #00f5d4 0%, #00bbf9 100%);
            color: #060913;
            border: none;
            border-radius: 12px;
            padding: 14px 20px;
            font-family: var(--font-sans);
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 20px rgba(0, 245, 212, 0.2);
            outline: none;
            margin-top: 1rem;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(0, 245, 212, 0.4);
            filter: brightness(1.05);
        }

        .submit-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="register-card">
        
        <!-- Header -->
        <div class="card-header">
            <span class="header-icon">📦</span>
            <h1 class="header-title">Register form</h1>
        </div>

        <form action="" method="POST">
            
            <!-- Username Field -->
            <div class="form-group">
                <label class="form-label" for="username">ชื่อผู้ใช้ (Username)</label>
                <input class="form-input" id="username" type="text" name="username" placeholder="กรอกชื่อผู้ใช้ของคุณ..." required>
            </div>

            <!-- Password Field -->
            <div class="form-group">
                <label class="form-label" for="password">รหัสผ่าน (Password)</label>
                <input class="form-input" id="password" type="password" name="password" placeholder="••••••••" required>
            </div>

            <!-- Email Field -->
            <div class="form-group">
                <label class="form-label" for="email">อีเมล (Email)</label>
                <input class="form-input" id="email" type="email" name="email" placeholder="example@email.com" required>
            </div>

            <!-- Package Selection (Radio Buttons) -->
            <div class="options-group">
                <p class="options-title">เลือกแพ็กเกจ (Package)</p>
                <div class="options-list">
                    <label class="option-label">
                        <input class="option-input" type="radio" name="package" value="free" required>
                        <span>ฟรี (Free)</span>
                    </label>
                    <label class="option-label">
                        <input class="option-input" type="radio" name="package" value="premium">
                        <span>พรีเมียม (Premium)</span>
                    </label>
                </div>
            </div>

            <!-- Interests (Checkboxes) -->
            <div class="options-group">
                <p class="options-title">ความสนใจ (Interests)</p>
                <div class="options-list">
                    <label class="option-label">
                        <input class="option-input" type="checkbox" name="interests" value="movies">
                        <span>ดูหนัง</span>
                    </label>
                    <label class="option-label">
                        <input class="option-input" type="checkbox" name="interests" value="music">
                        <span>ฟังเพลง</span>
                    </label>
                    <label class="option-label">
                        <input class="option-input" type="checkbox" name="interests" value="games">
                        <span>เล่นเกม</span>
                    </label>
                </div>
            </div>

            <!-- Submit Button -->
            <button class="submit-btn" type="submit">ยืนยันการสมัคร</button>

        </form>

    </div>

</body>
</html>
