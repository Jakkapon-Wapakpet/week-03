<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Form</title>
    <!-- Google Fonts: Outfit & Prompt -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #090d16;
            --card-bg: rgba(255, 255, 255, 0.04);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --accent-color: #00f5d4;
            --accent-glow: rgba(0, 245, 212, 0.35);
            --font-sans: 'Outfit', 'Prompt', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-sans);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2.5rem 1rem;
            position: relative;
            overflow-x: hidden;
        }

        /* Ambient Glowing Background Blobs */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.25;
            pointer-events: none;
            animation: floatBlob 15s infinite alternate ease-in-out;
        }

        .blob-1 {
            width: 380px;
            height: 380px;
            background: var(--accent-color);
            top: -10%;
            left: 10%;
            animation-duration: 12s;
        }

        .blob-2 {
            width: 450px;
            height: 450px;
            background: #00bbf9;
            bottom: -15%;
            right: 5%;
            animation-duration: 18s;
        }

        .blob-3 {
            width: 320px;
            height: 320px;
            background: #7928ca;
            top: 40%;
            left: 45%;
            animation-duration: 14s;
        }

        @keyframes floatBlob {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(40px, -50px) scale(1.15); }
            100% { transform: translate(-30px, 30px) scale(0.9); }
        }

        /* Glassmorphic Signup Card */
        .register-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 28px;
            padding: 3.5rem 2.75rem;
            width: 100%;
            max-width: 480px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.45), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            animation: cardEntrance 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            z-index: 10;
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(40px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Header Layout & Glowing Text */
        .card-header {
            display: flex;
            align-items: center;
            gap: 1.25rem;
            margin-bottom: 2.75rem;
        }

        .header-icon {
            font-size: 2.8rem;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.2));
            animation: floatIcon 3.5s ease-in-out infinite;
        }

        @keyframes floatIcon {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-8px) rotate(4deg); }
        }

        .header-title {
            font-size: 2.3rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff 30%, var(--accent-color) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 245, 212, 0.15);
        }

        /* Form Controls */
        .form-group {
            margin-bottom: 1.75rem;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .form-label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: 0.5px;
            text-transform: uppercase;
            font-family: var(--font-sans);
        }

        .form-input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 14px 18px;
            font-family: var(--font-sans);
            font-size: 0.95rem;
            color: var(--text-primary);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
        }

        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        .form-input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 15px var(--accent-glow);
            background: rgba(255, 255, 255, 0.06);
            transform: translateY(-1px);
        }

        /* Modern Chip Selections */
        .options-group {
            margin-bottom: 2rem;
        }

        .options-title {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.9rem;
            color: var(--text-primary);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .options-list {
            display: flex;
            gap: 0.75rem;
            width: 100%;
        }

        /* Hiding actual checkbox/radio inputs */
        .option-input {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        /* Designing custom chip wrapper labels */
        .option-label {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 16px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            user-select: none;
            font-size: 0.92rem;
            flex: 1;
            text-align: center;
            font-weight: 500;
        }

        .option-label:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.15);
            color: var(--text-primary);
            transform: translateY(-1px);
        }

        /* Glowing Active Chip State using :has */
        .option-label:has(.option-input:checked) {
            background: rgba(0, 245, 212, 0.09);
            border-color: var(--accent-color);
            color: var(--accent-color);
            box-shadow: 0 0 20px rgba(0, 245, 212, 0.25);
            font-weight: 700;
            transform: translateY(-2px);
        }

        /* Glowing Submit Button with Metallic Shine Effect */
        .submit-btn {
            position: relative;
            background: linear-gradient(135deg, #00f5d4 0%, #00bbf9 100%);
            color: #060913;
            border: none;
            border-radius: 14px;
            padding: 16px 20px;
            font-family: var(--font-sans);
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 8px 30px rgba(0, 245, 212, 0.25);
            outline: none;
            margin-top: 1.25rem;
            overflow: hidden;
            letter-spacing: 0.5px;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                120deg,
                transparent,
                rgba(255, 255, 255, 0.35),
                transparent
            );
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .submit-btn:hover::before {
            left: 100%;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(0, 245, 212, 0.4);
            filter: brightness(1.08);
        }

        .submit-btn:active {
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <!-- Background Blobs -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="register-card">
        
        <!-- Header -->
        <div class="card-header">
            <span class="header-icon">📦</span>
            <h1 class="header-title">Register form</h1>
        </div>

        <form action="" method="POST">
            
            <!-- Username Field -->
            <div class="form-group">
                <label class="form-label" for="username">ชื่อผู้ใช้ (Username)</label>
                <input class="form-input" id="username" type="text" name="username" placeholder="กรอกชื่อผู้ใช้ของคุณ..." required>
            </div>

            <!-- Password Field -->
            <div class="form-group">
                <label class="form-label" for="password">รหัสผ่าน (Password)</label>
                <input class="form-input" id="password" type="password" name="password" placeholder="••••••••" required>
            </div>

            <!-- Email Field -->
            <div class="form-group">
                <label class="form-label" for="email">อีเมล (Email)</label>
                <input class="form-input" id="email" type="email" name="email" placeholder="example@email.com" required>
            </div>

            <!-- Package Selection (Radio Buttons as Chips) -->
            <div class="options-group">
                <p class="options-title">เลือกแพ็กเกจ (Package)</p>
                <div class="options-list">
                    <label class="option-label">
                        <input class="option-input" type="radio" name="package" value="free" required>
                        <span>ฟรี (Free)</span>
                    </label>
                    <label class="option-label">
                        <input class="option-input" type="radio" name="package" value="premium">
                        <span>พรีเมียม (Premium)</span>
                    </label>
                </div>
            </div>

            <!-- Interests (Checkboxes as Chips) -->
            <div class="options-group">
                <p class="options-title">ความสนใจ (Interests)</p>
                <div class="options-list">
                    <label class="option-label">
                        <input class="option-input" type="checkbox" name="interests" value="movies">
                        <span>ดูหนัง</span>
                    </label>
                    <label class="option-label">
                        <input class="option-input" type="checkbox" name="interests" value="music">
                        <span>ฟังเพลง</span>
                    </label>
                    <label class="option-label">
                        <input class="option-input" type="checkbox" name="interests" value="games">
                        <span>เล่นเกม</span>
                    </label>
                </div>
            </div>

            <!-- Submit Button -->
            <button class="submit-btn" type="submit">ยืนยันการสมัคร</button>

        </form>

    </div>

</body>
</html>
